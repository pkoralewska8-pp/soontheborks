<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrick & Patrycja</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #ffffff;
    color: #222;
    line-height: 1.7;
}

header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
    url('https://images.unsplash.com/photo-1529636798458-92182e662485');
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    margin: 0;
}

section {
    padding: 100px 20px;
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    margin-bottom: 40px;
}

p { text-align: center; }

.lang {
    position: fixed;
    top: 20px;
    right: 20px;
}

.reservation-box {
    background: #f7f7f7;
    border-radius: 14px;
    padding: 30px;
    margin-top: 30px;
}

.reservation-box input,
.reservation-box select {
    padding: 10px;
    margin: 8px 0;
    width: 100%;
}

button {
    padding: 12px;
    background: #222;
    color: white;
    border: none;
}

/* POPUP */
#popup {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    align-items:center;
    justify-content:center;
}

#popupBox {
    background:white;
    padding:40px;
    border-radius:16px;
    text-align:center;
}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('pl')">PL</button>
<button onclick="setLang('de')">DE</button>
</div>

<header>
<h1>Patrick & Patrycja</h1>
<p>05.09.2026</p>
<div id="countdown"></div>
</header>

<section>
<h2 class="trans" data-pl="Noclegi" data-de="Unterkunft"></h2>

<div class="reservation-box">

<table style="width:100%; text-align:center;">
<tr>
<th></th>
<th class="trans" data-pl="Nd–Czw" data-de="So–Do"></th>
<th class="trans" data-pl="Pt–Sob" data-de="Fr–Sa"></th>
</tr>

<tr><td><strong>Hotel Ostaniec</strong></td><td></td><td></td></tr>

<tr>
<td class="trans" data-pl="Pokój 2-osobowy" data-de="Doppelzimmer"></td>
<td>323 zł</td>
<td>374 zł</td>
</tr>

<tr>
<td>Studio</td>
<td>616 zł</td>
<td>731 zł</td>
</tr>

<tr><td><strong>Osada Zborów</strong></td><td></td><td></td></tr>

<tr>
<td class="trans" data-pl="Pokój 2-osobowy" data-de="Doppelzimmer"></td>
<td>306 zł</td>
<td>320 zł</td>
</tr>

</table>

<form id="noclegForm" action="https://formspree.io/f/xzzpqqpb" method="POST">

<select id="lokalizacja" name="Lokalizacja">
<option value="hotel">Hotel Ostaniec</option>
<option value="osada">Osada Zborów</option>
</select>

<input type="text" name="Imie" placeholder="Imię i nazwisko" required>

<input type="date" name="Od" required>
<input type="date" name="Do" required>

<select id="pokoj" name="Pokoj">
<option value="2">Pokój 2-osobowy</option>
<option value="studio">Studio</option>
</select>

<button type="submit"
class="trans"
data-pl="Rezerwuj nocleg"
data-de="Unterkunft reservieren">
</button>

</form>

</div>
</section>

<!-- POPUP -->
<div id="popup">
<div id="popupBox">
<p id="popupText"></p>
<p>Patrycja & Patrick</p>
</div>
</div>

<script>

let currentLang="pl";

function setLang(lang){
currentLang=lang;
document.querySelectorAll('.trans').forEach(el=>{
el.innerHTML=el.getAttribute('data-'+lang);
});
updateCountdown();
}

const wedding=new Date("Sep 5 2026 16:00").getTime();

function updateCountdown(){
let now=new Date().getTime();
let d=wedding-now;

let days=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((d%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML=
currentLang==="de"
? days+" Tage "+h+" Std "+m+" Min"
: days+" dni "+h+" godz "+m+" min";
}

setInterval(updateCountdown,1000);
updateCountdown();

const lokalizacja=document.getElementById('lokalizacja');
const pokoj=document.getElementById('pokoj');

lokalizacja.addEventListener('change',()=>{
if(lokalizacja.value==="osada"){
[...pokoj.options].forEach(o=>o.disabled=o.value!=="2");
pokoj.value="2";
}else{
[...pokoj.options].forEach(o=>o.disabled=false);
}
});

const form=document.getElementById('noclegForm');

form.addEventListener('submit',async e=>{
e.preventDefault();

await fetch(form.action,{
method:'POST',
body:new FormData(form),
headers:{'Accept':'application/json'}
});

form.reset();

const popup=document.getElementById('popup');
const text=document.getElementById('popupText');

text.innerHTML=currentLang==="de"
? "Danke, dass du diesen besonderen Tag mit uns verbringst ❤️"
: "Dziękujemy, że jesteś z nami ❤️";

popup.style.display="flex";

setTimeout(()=>popup.style.display="none",4000);
});

setLang('pl');

</script>

</body>
</html>
