@media (max-width: 768px) {

    header h1 { font-size: 38px; }

<script>

let currentLang = "pl";

const weddingDate =
new Date("Sep 5, 2026 16:00:00").getTime();

/* LICZNIK */

function updateCountdown() {

    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(
        distance / (1000 * 60 * 60 * 24)
    );

    const hours = Math.floor(
        (distance %
        (1000*60*60*24)) /
        (1000*60*60)
    );

    const minutes = Math.floor(
        (distance %
        (1000*60*60)) /
        (1000*60)
    );

    if(currentLang === "de") {

        document.getElementById(
        "countdown").innerHTML =

        days + " Tage " +
        hours + " Std " +
        minutes + " Min";

    }

    else {

        document.getElementById(
        "countdown").innerHTML =

        days + " dni " +
        hours + " godz " +
        minutes + " min";

    }

}

setInterval(updateCountdown, 1000);
updateCountdown();

/* JĘZYK */

function setLang(lang) {

    currentLang = lang;

    document
    .querySelectorAll('.trans')
    .forEach(el => {

        if(lang === 'de') {
            el.innerHTML =
            el.getAttribute('data-de');
        }

        else {
            el.innerHTML =
            el.getAttribute('data-pl');
        }

    });

    updateCountdown();

}

setLang('pl');

/* FORMULARZ */

const form =
document.getElementById(
'noclegForm'
);

if(form) {

form.addEventListener(
'submit',
async function(e) {

    e.preventDefault();

    const od =
    form.querySelector(
    'input[name="Od"]'
    ).value;

    const doData =
    form.querySelector(
    'input[name="Do"]'
    ).value;

    if(od && doData) {

        const odDate =
        new Date(od);

        const doDateObj =
        new Date(doData);

        if(doDateObj < odDate) {

            if(currentLang === "de") {

                alert(
                "Das Abreisedatum kann nicht vor dem Anreisedatum liegen."
                );

            }

            else {

                alert(
                "Data wyjazdu nie może być wcześniejsza niż data przyjazdu."
                );

            }

            return;

        }

    }

    const data =
    new FormData(form);

    await fetch(
        form.action,
        {
            method: 'POST',
            body: data,
            headers: {
                'Accept':
                'application/json'
            }
        }
    );

    form.reset();

    document
    .getElementById(
    'successMessage'
    ).style.display =
    'block';

});

}

/* ANIMACJE */

const sections =
document.querySelectorAll(
"section"
);

window.addEventListener(
"load",
() => {

    sections.forEach(sec =>
        sec.classList.add(
        "visible"
        )
    );

});

window.addEventListener(
"scroll",
() => {

    sections.forEach(sec => {

        const top =
        sec.getBoundingClientRect()
        .top;

        if(top <
        window.innerHeight - 100) {

            sec.classList.add(
            "visible"
            );

        }

    });

});

</script>
